services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - '${MONGO_PORT:-27017}:27017'
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./Backend
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://mongo:27017/leadsrack
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: '4000'
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-10}
      NODE_ENV: production
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - '${API_PORT:-4000}:4000'

  web:
    build:
      context: ./Frontend
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '${WEB_PORT:-8080}:80'

volumes:
  mongo_data:
